<style>
  :root{
    --ink:#1B1B20; --ink-soft:#5C5B63; --ink-faint:#A6A29A;
    --paper:#FCFBF9; --card:#FFFFFF; --line:#ECE9E2; --line-soft:#F1EEE8;
    --accent:#FF5C38; --accent-deep:#D8431F; --accent-tint:#FFEDE7;
    --green:#16A34A; --green-bg:#EAF7EE; --green-line:#BBE6C8;
    --red:#E24B4A; --red-bg:#FBEAE4; --red-line:#F6C9BC;
    --amber:#B45309; --amber-bg:#FFF7E8; --amber-line:#FAD89A; --amber-dot:#F59E0B;
    --blue:#2563EB;
    --r:14px; --r-sm:9px;
    --shadow:0 1px 2px rgba(27,27,32,.03), 0 4px 18px rgba(27,27,32,.05);
    --shadow-lg:0 12px 44px rgba(27,27,32,.13);
    --font:'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{font-family:var(--font);background:var(--paper);color:var(--ink);line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}
  a{color:inherit}
  ::selection{background:var(--accent-tint);color:var(--accent-deep)}

  /* ---------- atoms ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:var(--r-sm);
    font-size:13.5px;font-weight:600;padding:10px 16px;transition:.15s;white-space:nowrap}
  .btn-primary{background:var(--ink);color:#fff}
  .btn-primary:hover{background:#000}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-accent:hover{background:var(--accent-deep)}
  .btn-ghost{background:#fff;color:var(--ink-soft);border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--line-soft);color:var(--ink)}
  .btn-sm{padding:7px 12px;font-size:12.5px;border-radius:7px}
  .btn[disabled]{opacity:.45;cursor:not-allowed}
  .btn-wa{background:#25D366;color:#fff} .btn-wa:hover{background:#1eae54}
  .icon-btn{width:33px;height:33px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);
    display:inline-flex;align-items:center;justify-content:center;font-size:15px;transition:.15s}
  .icon-btn:hover{background:var(--line-soft);color:var(--ink)}

  .field{margin-bottom:15px}
  .field label{display:block;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%;padding:10px 13px;border:1px solid var(--line);border-radius:var(--r-sm);
    font-size:14px;color:var(--ink);background:#fff;transition:.15s}
  .field textarea{resize:vertical;min-height:90px;line-height:1.6}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .field .hint{font-size:12px;color:var(--ink-faint);margin-top:5px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}

  .chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600}
  .chip-accent{background:var(--accent-tint);color:var(--accent-deep)}
  .chip-ink{background:#EFECE5;color:var(--ink-soft)}
  .sb{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:11.5px;font-weight:700;white-space:nowrap}
  .sb.pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-line)}
  .sb.approved{background:var(--green-bg);color:var(--green);border:1px solid var(--green-line)}
  .sb.rejected{background:var(--red-bg);color:var(--red);border:1px solid var(--red-line)}

const DOW_PT=['D','S','T','Q','Q','S','S'];
let _calItem=null, _calYM=null;
function closeCal(){ const el=$('calPop'); if(el) el.remove(); document.removeEventListener('mousedown',_calOutside,true); _calItem=null; }
function _calOutside(e){ const el=$('calPop'); if(el && !el.contains(e.target)) closeCal(); }
function openCal(ev, itemId){
  ev.stopPropagation();
  if($('calPop')) closeCal();
  _calItem=itemId;
  const it=S._items.find(x=>x.id===itemId);
  let y,mo;
  const iso=/^(\d{4})-(\d{2})-(\d{2})$/.exec(it&&it.post_date||'');
  if(iso){ y=+iso[1]; mo=+iso[2]-1; } else { const n=new Date(); y=n.getFullYear(); mo=n.getMonth(); }
  _calYM={y,mo};
  const pop=document.createElement('div'); pop.className='cal-pop'; pop.id='calPop';
  document.body.appendChild(pop);
  drawCal();
  // posiciona perto do botão
  const b=$('dbtn-'+itemId).getBoundingClientRect();
  let top=b.bottom+6, left=b.left;
  if(left+268>window.innerWidth-10) left=window.innerWidth-278;
  if(top+330>window.innerHeight) top=Math.max(10,b.top-336);
  pop.style.top=top+'px'; pop.style.left=left+'px';
  setTimeout(()=>document.addEventListener('mousedown',_calOutside,true),0);
}
function drawCal(){
  const pop=$('calPop'); if(!pop)return;
  const {y,mo}=_calYM;
  const it=S._items.find(x=>x.id===_calItem);
  const selIso=/^(\d{4})-(\d{2})-(\d{2})$/.exec(it&&it.post_date||'');
  const selY=selIso?+selIso[1]:null, selM=selIso?+selIso[2]-1:null, selD=selIso?+selIso[3]:null;
  const first=new Date(y,mo,1).getDay();
  const days=new Date(y,mo+1,0).getDate();
  const years=[]; const cy=new Date().getFullYear(); for(let i=cy-1;i<=cy+2;i++) years.push(i);
  let cells='';
  for(let i=0;i<first;i++) cells+=`<button class="cal-day empty"></button>`;
  for(let d=1;d<=days;d++){ const sel=(y===selY&&mo===selM&&d===selD); cells+=`<button class="cal-day ${sel?'sel':''}" onclick="pickDay(${d})">${d}</button>`; }
  pop.innerHTML=`
    <div class="cal-head">
      <button class="cal-nav" onclick="calMove(-1)">‹</button>
      <div style="display:flex;gap:5px">
        <select onchange="calSet('mo',this.value)">${MONTHS_PT.map((m,i)=>`<option value="${i}" ${i===mo?'selected':''}>${m}</option>`).join('')}</select>
        <select onchange="calSet('y',this.value)">${years.map(yy=>`<option value="${yy}" ${yy===y?'selected':''}>${yy}</option>`).join('')}</select>
      </div>
      <button class="cal-nav" onclick="calMove(1)">›</button>
    </div>
    <div class="cal-grid">${DOW_PT.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>
    <div class="cal-foot"><button class="clr" onclick="pickDay(0)">Limpar</button><button class="tdy" onclick="calToday()">Hoje</button></div>`;
}
function calMove(d){ let {y,mo}=_calYM; mo+=d; if(mo<0){mo=11;y--;} if(mo>11){mo=0;y++;} _calYM={y,mo}; drawCal(); }
function calSet(k,v){ _calYM[k]=+v; drawCal(); }
function calToday(){ const n=new Date(); _calYM={y:n.getFullYear(),mo:n.getMonth()}; drawCal(); }
async function pickDay(d){
  const it=S._items.find(x=>x.id===_calItem); const id=_calItem;
  let iso='';
  if(d>0){ const {y,mo}=_calYM; iso=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  if(it) it.post_date=iso;
  closeCal();
  // atualiza o botão sem re-renderizar tudo
  const btn=$('dbtn-'+id);
  if(btn){ btn.innerHTML='📅 '+(iso?fmtDate(iso):'Escolher data'); btn.classList.toggle('empty',!iso); }
  await sb.from('items').update({post_date:iso||null}).eq('id',id);
}

function getParams(){
  const out={};
  try{ new URLSearchParams(location.search).forEach((v,k)=>out[k]=v); }catch(e){}
  try{ const h=location.hash.replace(/^#\/?\??/,''); if(h){ // formato #/c/TOKEN
      const m=h.match(/^c\/([A-Za-z0-9]+)/); if(m) out.c=m[1];
      new URLSearchParams(h).forEach((v,k)=>{ if(!out[k]) out[k]=v; });
    } }catch(e){}
  return out;
}

async function loadAll(){
  const { data:clients, error:e1 } = await sb.from('clients').select('*').order('created_at');
  if(e1){ toast('Erro ao carregar clientes'); console.error(e1); return false; }
  const { data:projects } = await sb.from('projects').select('*').order('created_at');
  S.clients = clients||[]; S.projects = projects||[];
  try{ const { data:ag } = await sb.from('agency').select('*').eq('id',1).maybeSingle(); if(ag){ S.agency=ag; CFG.agencyName=ag.name||CFG.agencyName; } }catch(e){}
  return true;
}
async function projectStats(projectId){
  const p=S.projects.find(x=>x.id===projectId);
  // MENSAL: a "unidade" de aprovação é o mês inteiro + comentários contam como ajustes
  if(p&&p.mode==='mensal'){
    const { data:items } = await sb.from('items').select('id,note,row_type').eq('project_id',projectId);
    const notes=(items||[]).filter(i=>i.row_type!=='week'&&i.note&&i.note.trim()).length;
    const st=p.month_status;
    // total=1 (o mês), done=1 se já avaliado
    const done = st?1:0;
    const appr = st==='approved'?1:0;
    // ajustes pedidos no mês = nº de comentários (ou ao menos 1 se pediu revisão sem comentar)
    let rej = notes; if(st==='rejected'&&notes===0) rej=1;
    return {total:1, done, appr, rej, monthly:true, notes};
  }
  // SEMANAL: conta itens e decisões
  const { data:items } = await sb.from('items').select('id,has_copy,has_creative').eq('project_id',projectId);
  if(!items||!items.length) return {total:0,done:0,appr:0,rej:0};
  const ids=items.map(i=>i.id);
  const { data:decs } = await sb.from('decisions').select('item_id,kind,status').in('item_id',ids);
  let total=0; items.forEach(i=>{ if(i.has_copy)total++; if(i.has_creative)total++; });
  let done=0,appr=0,rej=0; (decs||[]).forEach(d=>{ done++; if(d.status==='approved')appr++; else if(d.status==='rejected')rej++; });
  return {total,done,appr,rej};
}

async function renderDashboard(){

  for(const p of S.projects){
    const st=await projectStats(p.id);
    // só conta como "aguardando" o que está publicado (já foi pro cliente)
    if(p.published) pend += (st.total-st.done);
    appr+=st.appr; rej+=st.rej;
  }
  // aprovações recentes: decisões (semanal) + status de mês (mensal), unificadas por data
  const recent=[];
  const { data:recentDecs } = await sb.from('decisions').select('*').order('updated_at',{ascending:false}).limit(8);
  for(const d of (recentDecs||[])){
    const { data:it } = await sb.from('items').select('title,project_id').eq('id',d.item_id).single();

  recent.sort((a,b)=> (b.when||'').localeCompare(a.when||''));

  let recentRows='';

    for(const r of recentTop){
      const ok=r.status==='approved';

      recentRows+=`<div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--line-soft)">
        <div style="width:26px;height:26px;border-radius:7px;background:${r.ccolor};color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${esc((r.cname||'?').slice(0,2).toUpperCase())}</div>
        <div style="font-size:12.5px;flex:1">${esc(r.cname)} · <span style="color:var(--ink-faint)">${esc(r.label)}</span></div>
        <span class="sb ${ok?'approved':'rejected'}">${stLabel}</span></div>`;
    }
  } else { recentRows=`<div style="padding:16px 0;color:var(--ink-faint);font-size:13px">Nenhuma resposta ainda. Publique um cronograma e envie o link ao cliente.</div>`; }

  const body=`
    <div class="page-head"><div><h2>Dashboard</h2><p>Visão geral das aprovações de todos os clientes.</p></div>
      <button class="btn btn-accent" onclick="editClient()">＋ Novo cliente</button></div>
    <div class="stats">
      ${stat('var(--accent)','CLIENTES ATIVOS',activeClients,'Cadastrados no sistema')}
      ${stat('var(--amber-dot)','AGUARDANDO APROVAÇÃO',pend,'Pendentes do cliente (semanal + mês)')}
      ${stat('var(--green)','APROVADOS',appr,'Liberados para publicar')}
      ${stat('var(--red)','AJUSTES PEDIDOS',rej,'Reprovados com observação')}
    </div>
    <div class="tcard" style="padding:17px 20px">
      <div style="display:flex;align-items:center;justify-content:space-between"><div style="font-size:14px;font-weight:700">Aprovações recentes</div>
      <span style="font-size:12.5px;font-weight:600;color:var(--accent);cursor:pointer" onclick="nav('clients')">Ver clientes →</span></div>
      ${recentRows}

function uploadClientLogo(input){
  const f=input.files&&input.files[0]; if(!f)return;
  if(!f.type.startsWith('image/')) return toast('Selecione uma imagem');
  const r=new FileReader();
  r.onload=e=>{ const img=new Image();
    img.onload=()=>{ const sz=256; const cv=document.createElement('canvas'); cv.width=sz; cv.height=sz;
      const ctx=cv.getContext('2d'); const m=Math.min(img.width,img.height); const sx=(img.width-m)/2, sy=(img.height-m)/2;
      ctx.drawImage(img,sx,sy,m,m,0,0,sz,sz);
      let data=cv.toDataURL('image/jpeg',0.85);
      if(data.length>180000) data=cv.toDataURL('image/jpeg',0.6);
      S._clientLogoTmp=data;
      const prev=$('cLogoPrev'); if(prev) prev.innerHTML=`<img src="${data}" style="width:100%;height:100%;object-fit:cover">`;
      toast('Logo carregada — clique em Salvar');
    };
    img.src=e.target.result; };
  r.readAsDataURL(f);
}
function removeClientLogo(){ S._clientLogoTmp=''; const prev=$('cLogoPrev'); if(prev) prev.innerHTML=esc(($('cInit')&&$('cInit').value||$('cName')&&$('cName').value||'?').slice(0,2).toUpperCase()); toast('Logo removida — clique em Salvar'); }
function pickColor(c){ $('cColor').value=c; document.querySelectorAll('.swcolor').forEach(b=>b.style.borderColor=(b.dataset.c===c?'var(--ink)':'transparent')); const prev=$('cLogoPrev'); if(prev&&!S._clientLogoTmp) prev.style.background=c; }

async function renderProject(projectId){
  S.view='clients'; S.projectId=projectId;
  shell(`<div class="loading"><div class="spin"></div><p>Carregando cronograma…</p></div>`);
  await loadAll();
  const p=S.projects.find(x=>x.id===projectId); if(!p) return renderClients();
  const c=S.clients.find(x=>x.id===p.client_id);
  const isMonthly=(p.mode==='mensal') || (!p.mode && p.kind==='Mensal');
  if(!p.mode){ // cronograma antigo sem modo: grava o modo inferido para consertar
    const inferred=isMonthly?'mensal':'semanal';
    sb.from('projects').update({mode:inferred}).eq('id',p.id);
    p.mode=inferred;
  }
  const { data:items } = await sb.from('items').select('*').eq('project_id',projectId).order('sort');
  S._items=items||[];
  const link=clientLinkFor(c);

  const head=`
    <div class="page-head"><div>
      <div class="crumb"><a onclick="nav('clients')">Clientes</a> / <a onclick="renderClientPage('${c.id}')">${esc(c.name)}</a> / <b>${esc(p.title)}</b></div>
      <h2>${esc(p.title)}</h2>
      <p><span class="chip ${isMonthly?'chip-accent':'chip-ink'}">${isMonthly?'🗓️ Mensal':'📸 Semanal'}</span> <span class="chip chip-ink">${esc(p.kind)}</span> ${esc(p.period||'')} · ${(items||[]).length} ${isMonthly?'linhas':'itens'}</p></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="editProject('${p.id}')">Editar dados</button>
        <button class="btn btn-ghost" style="color:var(--red);border-color:var(--red-line)" onclick="delProject('${p.id}','${c.id}')">🗑 Excluir</button>
        <button class="btn btn-ghost" onclick="renderTracking('${p.id}')">📊 Respostas</button>
        ${p.published?`<button class="btn btn-primary" onclick="togglePublish('${p.id}',true)">✓ Publicado</button>`
          :`<button class="btn btn-accent" onclick="togglePublish('${p.id}',false)">🚀 Publicar</button>`}</div></div>
    ${p.published?`<div class="tcard" style="padding:14px 17px;margin-bottom:8px;display:flex;align-items:center;gap:13px;flex-wrap:wrap">
        <span style="font-weight:700;font-size:13px">🔗 Link do cliente:</span>
        <div class="link-box" style="flex:1;min-width:240px"><code>${esc(link)}</code></div>
        <button class="btn btn-ghost btn-sm" onclick="copyText('${esc(link)}','Link copiado!')">Copiar</button>
        <button class="btn btn-ghost btn-sm" onclick="shareWa('${esc(c.name)}','${esc(link)}')">WhatsApp</button></div>`:''}`;

  if(isMonthly){ return shell(head + monthlyEditorBody(p,items||[])); }

  // ----- SEMANAL (posts com copy/criativo) -----
  const ids=(items||[]).map(i=>i.id);
  let decs=[]; if(ids.length){ const r=await sb.from('decisions').select('*').in('item_id',ids); decs=r.data||[]; }
  const decMap={}; decs.forEach(d=>decMap[d.item_id+'-'+d.kind]=d);
  S._decMap=decMap;
  const cell=(need,d)=> !need?'<span class="chip chip-ink">—</span>'
    : d&&d.status==='approved'?'<span class="sb approved">✓</span>'
    : d&&d.status==='rejected'?'<span class="sb rejected">✕</span>':'<span class="sb pending">○</span>';
  const scheduleRows=(items&&items.length)?items.map((it,i)=>`<tr>
      <td><span class="pnum">${i+1}</span></td>
      <td><strong>${esc(it.title||'(sem título)')}</strong></td>
      <td>${(it.platforms||[]).map(x=>`<span class="chip chip-accent">${esc(x)}</span>`).join(' ')||'<span class="chip chip-ink">—</span>'} ${it.format?`<span class="chip chip-ink">${esc(it.format)}</span>`:''}</td>
      <td>${cell(it.has_copy,decMap[it.id+'-copy'])}</td>
      <td>${cell(it.has_creative,decMap[it.id+'-creative'])}</td></tr>`).join('')
    : `<tr><td colspan="5" style="text-align:center;color:var(--ink-faint);padding:28px">Nenhum item ainda.</td></tr>`;
  const itemsEd=(items||[]).map((it,i)=>itemEditorHTML(it,i)).join('');
  const body=head+`
    <div class="secbar"><div class="ico">📅</div><h3>Cronograma</h3></div>
    <div class="tcard"><table><thead><tr><th>#</th><th>Pauta</th><th>Plataforma / Formato</th><th>Copy</th><th>Criativo</th></tr></thead><tbody>${scheduleRows}</tbody></table></div>
    <div class="secbar"><div class="ico">✏️</div><h3>Posts da semana</h3><div class="spacer"></div><button class="btn btn-ghost btn-sm" onclick="addItem('${p.id}')">＋ Adicionar post</button></div>
    <div id="itemsList">${itemsEd||`<div class="empty"><div class="em">📝</div><h3>Sem posts</h3><p>Adicione o primeiro post da semana.</p><br><button class="btn btn-accent" onclick="addItem('${p.id}')">＋ Adicionar post</button></div>`}</div>
    ${(items||[]).length?`<div style="text-align:center;margin-top:18px"><button class="btn btn-ghost" onclick="addItem('${p.id}')">＋ Adicionar mais um post</button></div>`:''}`;
  shell(body);
}

/* ---------- editor MENSAL (planejamento) ---------- */
const FORMATS=['Estático','Carrossel','Reels','Story'];
function monthlyEditorBody(p,items){
  // items vêm ordenados por sort; agrupa: cada 'week' inicia um grupo, 'post' pertence à semana anterior
  let html='', curWeek=null, weekPosts=[];
  const flush=()=>{
    if(!curWeek) return;
    html+=weekBlockHTML(curWeek, weekPosts, p.id);
    weekPosts=[];
  };
  items.forEach(it=>{
    if(it.row_type==='week'){ flush(); curWeek=it; }
    else { weekPosts.push(it); }
  });
  flush();
  return `
    <div class="secbar"><div class="ico">🗓️</div><h3>Planejamento do mês</h3><div class="spacer"></div>
      <button class="btn btn-accent btn-sm" onclick="addWeek('${p.id}')">＋ Nova semana</button></div>
    <p style="font-size:13px;color:var(--ink-soft);margin:-8px 0 16px">Crie as semanas e, dentro de cada uma, adicione os posts (formato, tema, descrição e data). O cliente aprova o mês inteiro e pode comentar em cada post.</p>
    ${html||`<div class="empty"><div class="em">🗓️</div><h3>Sem semanas</h3><p>Comece criando a primeira semana do mês.</p><br><button class="btn btn-accent" onclick="addWeek('${p.id}')">＋ Nova semana</button></div>`}
    ${items.length?`<div style="text-align:center;margin-top:18px"><button class="btn btn-ghost" onclick="addWeek('${p.id}')">＋ Nova semana</button></div>`:''}`;
}
function weekBlockHTML(week, posts, pid){
  const postsHTML = posts.map((it,i)=>`<div class="item-ed" style="margin:0 0 10px">
    <div class="item-ed-head" style="background:#fff">
      <span class="pnum" style="background:var(--ink-soft)">${i+1}</span>
      <select onchange="upd('${it.id}','format',this.value)" style="width:130px;padding:6px 9px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-weight:600">${FORMATS.map(f=>`<option ${it.format===f?'selected':''} value="${f}">${f}</option>`).join('')}</select>
      <button type="button" class="datebtn ${it.post_date?'':'empty'}" id="dbtn-${it.id}" onclick="openCal(event,'${it.id}')">📅 ${it.post_date?esc(fmtDate(it.post_date)):'Escolher data'}</button>
      <div class="spacer" style="flex:1"></div>
      <button class="icon-btn" title="Subir" onclick="moveItem('${it.id}',-1)">↑</button>
      <button class="icon-btn" title="Descer" onclick="moveItem('${it.id}',1)">↓</button>
      <button class="icon-btn" style="color:var(--red)" title="Excluir post" onclick="delItem('${it.id}')">🗑</button>
    </div>
    <div class="item-ed-body">
      <div class="field" style="margin-bottom:10px"><label>Tema do post</label>
        <input value="${esc(it.title||'')}" onchange="upd('${it.id}','title',this.value)" placeholder="Ex.: Os 3 erros mais comuns na logística" style="font-weight:600"></div>
      <div class="field" style="margin-bottom:0"><label>Descrição / detalhamento</label>
        <textarea onchange="upd('${it.id}','description',this.value)" placeholder="Ideia do post, o que vai em cada card do carrossel, roteiro do reels, referências…" style="min-height:80px">${esc(it.description||'')}</textarea></div>
    </div></div>`).join('');
  return `<div style="border:1px solid var(--line);border-radius:var(--r);background:var(--line-soft);padding:16px;margin-bottom:18px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <span style="font-size:18px">🗂️</span>
      <input value="${esc(week.title||week.week||'')}" onchange="upd('${week.id}','title',this.value)" placeholder="Semana 1" style="font-size:16px;font-weight:700;border:none;background:transparent;flex:1;min-width:0;padding:4px 0;border-bottom:2px solid transparent" onfocus="this.style.borderBottomColor='var(--accent)'" onblur="this.style.borderBottomColor='transparent'">
      <span class="chip chip-ink">${posts.length} post${posts.length!==1?'s':''}</span>
      <button class="icon-btn" title="Mover semana acima" onclick="moveItem('${week.id}',-1)">↑</button>
      <button class="icon-btn" title="Mover semana abaixo" onclick="moveItem('${week.id}',1)">↓</button>
      <button class="icon-btn" style="color:var(--red)" title="Excluir semana e seus posts" onclick="delWeek('${week.id}')">🗑</button>
    </div>
    ${postsHTML||'<p style="font-size:13px;color:var(--ink-faint);padding:4px 0 12px">Nenhum post nesta semana ainda.</p>'}
    <button class="btn btn-ghost btn-sm" style="margin-top:4px" onclick="addPost('${pid}','${week.id}')">＋ Adicionar post nesta semana</button>
  </div>`;
}
async function addWeek(pid){
  const sort=(S._items.length?Math.max(...S._items.map(i=>i.sort||0))+1:0);
  const weekNum=S._items.filter(i=>i.row_type==='week').length+1;
  const rec={ project_id:pid, row_type:'week', title:'Semana '+weekNum, has_copy:false, has_creative:false, sort };
  const { error }=await sb.from('items').insert(rec);
  if(error){ console.error(error); return toast('Erro ao criar semana'); }
  renderProject(pid);
}
async function addPost(pid, weekId){
  // novo post entra logo após o último item da semana (mantém agrupamento por sort)
  const week=S._items.find(i=>i.id===weekId);
  // acha o maior sort entre a semana e seus posts até a próxima semana
  const sorted=S._items.slice().sort((a,b)=>(a.sort||0)-(b.sort||0));
  const wIdx=sorted.findIndex(i=>i.id===weekId);
  let insertSort=(week.sort||0)+1;
  for(let k=wIdx+1;k<sorted.length;k++){ if(sorted[k].row_type==='week') break; insertSort=(sorted[k].sort||0)+1; }
  // abre espaço: empurra itens com sort >= insertSort
  for(const it of S._items){ if((it.sort||0)>=insertSort){ await sb.from('items').update({sort:(it.sort||0)+1}).eq('id',it.id); } }

/* upload p/ Supabase Storage */
function uploadImg(id,input){
  const f=input.files&&input.files[0]; if(!f)return;
  const isVideo=f.type.startsWith('video/');
  const isImage=f.type.startsWith('image/');
  if(!isVideo&&!isImage) return toast('Selecione uma imagem ou vídeo');

  if(isVideo){
    // limite de segurança pro plano free do Storage
    const MB=f.size/1048576;
    if(MB>50) return toast('Vídeo de '+MB.toFixed(0)+'MB excede o limite de 50MB. Para vídeos maiores, hospede em outro lugar e cole a URL no campo ao lado.');
    toast('Enviando vídeo… pode levar alguns segundos');
    (async()=>{
      const ext=(f.name.split('.').pop()||'mp4').toLowerCase().replace(/[^a-z0-9]/g,'')||'mp4';
      const path=S.projectId+'/'+id+'-'+Date.now()+'.'+ext;
      const { error }=await sb.storage.from(CFG.bucket).upload(path,f,{contentType:f.type,upsert:true});
      if(error){ console.error(error); return toast('Erro no upload: '+error.message); }
      const { data:pub }=sb.storage.from(CFG.bucket).getPublicUrl(path);
      await sb.from('items').update({creative_url:pub.publicUrl,creative_type:'video'}).eq('id',id);
      renderProject(S.projectId); toast('Vídeo adicionado');
    })();
    return;
  }

  toast('Enviando imagem…');
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=async()=>{
      const maxW=1400; let w=img.width,h=img.height;
      if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(async(blob)=>{
        if(!blob) return toast('Falha ao processar imagem');
        const path=S.projectId+'/'+id+'-'+Date.now()+'.jpg';
        const { error }=await sb.storage.from(CFG.bucket).upload(path,blob,{contentType:'image/jpeg',upsert:true});
        if(error){ console.error(error); return toast('Erro no upload: '+error.message); }
        const { data:pub }=sb.storage.from(CFG.bucket).getPublicUrl(path);
        await sb.from('items').update({creative_url:pub.publicUrl,creative_type:'image'}).eq('id',id);
        renderProject(S.projectId); toast('Imagem adicionada');
      },'image/jpeg',0.85);
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f);
}
/* detecta se a URL é vídeo (por extensão) quando creative_type não está definido */
function isVideoCreative(it){
  if(it.creative_type) return it.creative_type==='video';
  const u=(it.creative_url||'').toLowerCase().split('?')[0];
  return /\.(mp4|mov|webm|m4v|ogg)$/.test(u);
}
function creativeMediaHTML(it){
  const src=it.creative_url||''; if(!src) return '';
  if(isVideoCreative(it)) return `<video src="${esc(src)}" controls playsinline style="width:100%;max-height:360px;display:block;background:#000"></video>`;
  return `<img src="${esc(src)}">`;
}

function uploadLogo(input){
  const f=input.files&&input.files[0]; if(!f)return;
  if(!f.type.startsWith('image/')) return toast('Selecione uma imagem');
  const r=new FileReader();
  r.onload=e=>{ const img=new Image();
    img.onload=()=>{ const sz=256; const cv=document.createElement('canvas'); cv.width=sz; cv.height=sz;
      const ctx=cv.getContext('2d');
      // recorte central quadrado
      const m=Math.min(img.width,img.height); const sx=(img.width-m)/2, sy=(img.height-m)/2;
      ctx.drawImage(img,sx,sy,m,m,0,0,sz,sz);
      let data=cv.toDataURL('image/jpeg',0.85);
      if(data.length>180000) data=cv.toDataURL('image/jpeg',0.6);
      S._logoTmp=data;
      const prev=$('logoPrev'); if(prev) prev.innerHTML=`<img src="${data}" style="width:100%;height:100%;object-fit:cover">`;
      toast('Foto carregada — clique em Salvar');
    };
    img.src=e.target.result; };
  r.readAsDataURL(f);
}
function removeLogo(){ S._logoTmp=''; const prev=$('logoPrev'); if(prev) prev.innerHTML=esc(($('stDisplay')&&$('stDisplay').value||$('stName')&&$('stName').value||'P').slice(0,2).toUpperCase()); toast('Logo removida — clique em Salvar'); }
async function saveSettings(){
  const rec={ id:1, name:$('stName').value.trim(), display_name:$('stDisplay').value.trim(), whatsapp:$('stWa').value.trim(), email:$('stEmail').value.trim(), logo:S._logoTmp||null };
  if(!rec.name) return toast('Informe o nome da agência');
  const { error }=await sb.from('agency').upsert(rec);
  if(error){ console.error(error); return toast('Erro ao salvar: '+error.message); }
  CFG.agencyName=rec.name; S.agency=rec; toast('Configurações salvas');
  renderDashboard();
}

async function enterClient(token){
  $('app').innerHTML=`<div class="loading"><div class="spin"></div><p>Abrindo suas aprovações…</p></div>`;
  connectClient(token);
  // busca o cliente (RLS só deixa ver o próprio)
  const { data:clients, error } = await sb.from('clients').select('*');
  if(error||!clients||!clients.length){
    $('app').innerHTML=`<div class="gate"><div class="gate-card"><div class="logo">plug<span class="dot">.</span>aprova</div><div class="tag" style="margin-bottom:18px">APROVAÇÃO DE CONTEÚDO</div><p style="color:var(--ink-soft);font-size:14px">Link inválido ou expirado. Confira com a sua agência se o endereço está correto.</p></div></div>`;

function clientPinGate(c){

async function finalizarEnvio(){
  const nm=$('cSender')&&$('cSender').value.trim();

  // marca o envio no projeto (pra agência ver que foi finalizado)
  try{ await sb.from('projects').update({month_sender:nm, month_ts:new Date().toISOString()}).eq('id',S.cActiveProj); }catch(e){}
  const sub=document.querySelector('.send-inner');
  if(sub){ sub.innerHTML=`<div class="si">✅</div><h2>Aprovação enviada!</h2><p style="max-width:420px;margin:8px auto 0">Tudo certo, ${esc(nm)}. A ${esc(CFG.agencyName)} já recebeu suas respostas e observações. Você pode fechar esta página.</p>`; }

      <div class="post-head"><span class="pnum" style="background:${accent}">${i+1}</span>

    </div>`).join('');
    groupsHTML+=`<div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div class="ico" style="width:32px;height:32px;border-radius:9px;background:${accent};color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px">🗂️</div>
        <h3 style="font-size:17px;font-weight:700">${esc(curWeek.title||curWeek.week||'Semana')}</h3>
        <span class="chip chip-ink">${wPosts.length} post${wPosts.length!==1?'s':''}</span></div>

        <button class="b-rj ${st==='rejected'?'on':''}" id="mRj" style="padding:11px 22px;font-size:14px" onclick="decideMonth('${p.id}','rejected')">✕ Pedir revisão</button>

      <div style="display:flex;justify-content:center;margin-top:14px">
        <button class="btn btn-wa" onclick="cliWhatsapp()">📲 Enviar resumo no WhatsApp</button>
      </div>
      <div style="border-top:1px solid var(--line);margin-top:18px;padding-top:16px">
        <div id="mStatus" style="font-size:13px;font-weight:600;color:${st==='approved'?'var(--green)':st==='rejected'?'var(--red)':'var(--ink-faint)'}">

      </div>
      </div></div>

  S._mSender=p.month_sender||'';

async function saveMonthNote(itemId,v){
  const it=S.cItems.find(x=>x.id===itemId); if(it) it.note=v;
  const { error }=await sb.from('items').update({note:v}).eq('id',itemId);
  if(error){ console.error(error); toast('Erro ao salvar observação'); }
}
async function decideMonth(pid,val){
  const p=S.cProjects.find(x=>x.id===pid);
  const sender=($('cSenderM')&&$('cSenderM').value.trim())||S._mSender||'';
  // toggle off
  if(p.month_status===val){
    p.month_status=null;
    await sb.from('projects').update({month_status:null,month_sender:sender,month_ts:new Date().toISOString()}).eq('id',pid);
    $('mAp').classList.remove('on'); $('mRj').classList.remove('on');
    $('mStatus').textContent='Aguardando sua avaliação'; $('mStatus').style.color='var(--ink-faint)';
    return;
  }
  p.month_status=val; p.month_sender=sender; p.month_ts=new Date().toISOString();
  const { error }=await sb.from('projects').update({month_status:val,month_sender:sender,month_ts:p.month_ts}).eq('id',pid);
  if(error){ console.error(error); return toast('Erro ao salvar'); }
  $('mAp').classList.toggle('on',val==='approved'); $('mRj').classList.toggle('on',val==='rejected');
  const lbl=val==='approved'?'✓ Mês aprovado':'✕ Revisão solicitada';
  $('mStatus').textContent=lbl+' em '+nowStr(); $('mStatus').style.color=val==='approved'?'var(--green)':'var(--red)';
  toast(val==='approved'?'Mês aprovado!':'Revisão solicitada');
}

function shade(hex){ try{ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.round(r*.68);g=Math.round(g*.68);b=Math.round(b*.68); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}catch(e){return hex;} }

function clientCardHTML(it,i,dm,c){
  const accent=c.color; const blocks=[];
  if(it.has_creative){ const src=it.creative_url||'';
    blocks.push(`<div class="blk"><div class="blk-label"><span class="chip chip-ink">🎨 Criativo</span></div>
    <div class="creative-prev">${src?creativeMediaHTML(it):'<div class="none">Criativo em produção. Será incluído quando finalizado.</div>'}</div>
    ${approveBoxHTML(it.id,'creative','Aprovação do Criativo',dm)}</div>`); }
  if(it.has_copy){ blocks.push(`<div class="blk"><div class="blk-label"><span class="chip chip-accent">✍️ Copy</span></div>
    <div class="copy-block" style="border-left-color:${accent}"><p>${esc(it.copy||'(sem texto)')}</p>${it.hashtags?`<p class="tags" style="color:${shade(accent)}">${esc(it.hashtags)}</p>`:''}</div>
    ${approveBoxHTML(it.id,'copy','Aprovação da Copy',dm)}</div>`); }
  return `<div class="post-card"><div class="post-head"><span class="pnum" style="background:${accent}">${i+1}</span>
    <div class="pinfo"><h3>${esc(it.title||'Item '+(i+1))}</h3><p>${(it.platforms||[]).join(' · ')||''}${it.format?' · '+esc(it.format):''}${it.angle?' · '+esc(it.angle):''}</p></div></div>${blocks.join('')}</div>`;
}
function approveBoxHTML(itemId,type,title,dm){
  const key=itemId+'-'+type; const d=dm[key];
  const cls=d?(d.status==='approved'?'is-approved':'is-rejected'):'';
  return `<div class="approve-box ${cls}" id="box-${key}"><div class="ap-top"><span class="ap-title">${title}</span>
    <button class="b-ap ${d&&d.status==='approved'?'on':''}" onclick="decide('${itemId}','${type}','approved')">✓ Aprovar</button>
    <button class="b-rj ${d&&d.status==='rejected'?'on':''}" onclick="decide('${itemId}','${type}','rejected')">✕ Reprovar</button></div>
    <div class="changefield ${d&&d.status==='rejected'?'show':''}" id="cf-${key}"><label>O que quer alterar?</label>
      <textarea id="nt-${key}" placeholder="Descreva o ajuste…" onchange="saveNote('${key}',this.value)">${d&&d.notes?esc(d.notes):''}</textarea></div>
    <div class="ap-ts ${d?'show':''}" id="ts-${key}">${d?(d.status==='approved'?'Aprovado':'Reprovado')+' em '+esc(new Date(d.updated_at||Date.now()).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'})):''}</div></div>`;
}
function drawClientSchedule(){
  const dm=S.cDecisions, items=S.cItems, accent=S.cClient.color;
  const el=$('cSchedule'); if(!el)return;
  el.innerHTML=items.map((it,i)=>{
    const cell=(need,t)=>{ if(!need)return '<span class="chip chip-ink">—</span>'; const d=dm[it.id+'-'+t];
      return !d?'<span class="sb pending">○</span>':d.status==='approved'?'<span class="sb approved">✓</span>':'<span class="sb rejected">✕</span>'; };
    return `<tr><td><span class="pnum" style="background:${accent}">${i+1}</span></td><td><strong>${esc(it.title||'')}</strong></td>
      <td style="font-size:12px">${(it.platforms||[]).join(', ')}</td><td>${cell(it.has_copy,'copy')}</td><td>${cell(it.has_creative,'creative')}</td></tr>`;
  }).join('');
}

async function decide(itemId,type,val){
  const key=itemId+'-'+type; const cur=S.cDecisions[key];
  const box=$('box-'+key), cf=$('cf-'+key), ts=$('ts-'+key);
  const ap=box.querySelector('.b-ap'), rj=box.querySelector('.b-rj');
  // toggle off
  if(cur&&cur.status===val){
    delete S.cDecisions[key];
    ap.classList.remove('on'); rj.classList.remove('on'); box.classList.remove('is-approved','is-rejected');
    cf.classList.remove('show'); ts.classList.remove('show'); ts.textContent='';
    await sb.from('decisions').delete().eq('item_id',itemId).eq('kind',type);
    drawClientSchedule(); updateClientProgress(); return;
  }
  const notes=$('nt-'+key)?$('nt-'+key).value.trim():'';
  const rec={ item_id:itemId, kind:type, status:val, notes:val==='rejected'?notes:'', sender:(S.cSender||$('cSender')&&$('cSender').value.trim()||''), updated_at:new Date().toISOString() };
  S.cDecisions[key]={...rec};
  ap.classList.toggle('on',val==='approved'); rj.classList.toggle('on',val==='rejected');
  box.classList.remove('is-approved','is-rejected'); box.classList.add(val==='approved'?'is-approved':'is-rejected');
  cf.classList.toggle('show',val==='rejected'); if(val==='rejected'&&$('nt-'+key))$('nt-'+key).focus();
  ts.textContent=(val==='approved'?'Aprovado':'Reprovado')+' em '+nowStr(); ts.classList.add('show');
  drawClientSchedule(); updateClientProgress();
  const { error }=await sb.from('decisions').upsert(rec,{onConflict:'item_id,kind'});
  if(error){ console.error(error); toast('Erro ao salvar resposta'); }
}
async function saveNote(key,v){
  if(!S.cDecisions[key])return; S.cDecisions[key].notes=v;
  const it=key.replace(/-(copy|creative)$/,''); const tp=key.endsWith('copy')?'copy':'creative';
  await sb.from('decisions').update({notes:v}).eq('item_id',it).eq('kind',tp);
}
function saveSender(v){ S.cSender=v; /* salvo junto na próxima decisão; atualiza existentes */ syncSender(v); }
async function syncSender(v){ const keys=Object.keys(S.cDecisions); for(const k of keys){ const it=k.replace(/-(copy|creative)$/,''); const tp=k.endsWith('copy')?'copy':'creative'; await sb.from('decisions').update({sender:v}).eq('item_id',it).eq('kind',tp);} }

function updateClientProgress(){
  let total=0,done=0;
  S.cItems.forEach(it=>{ if(it.has_copy){total++;if(S.cDecisions[it.id+'-copy'])done++;} if(it.has_creative){total++;if(S.cDecisions[it.id+'-creative'])done++;} });
  const pct=total?Math.round(done/total*100):0;
  if($('cFill'))$('cFill').style.width=pct+'%';
  if($('cCount'))$('cCount').textContent=`${done} de ${total} avaliados (${pct}%)`;
  const al=$('cAlert'); if(!al)return; const pend=total-done;
  if(pend>0){ al.classList.add('show'); al.innerHTML=`⚠️ Ainda há <b>&nbsp;${pend} ${pend===1?'item pendente':'itens pendentes'}</b>.`; }
  else al.classList.remove('show');
}
function buildClientText(){
  const c=S.cClient,p=S.cProjects.find(x=>x.id===S.cActiveProj);
  if(p.mode==='mensal'){
    const name=((($('cSenderM')&&$('cSenderM').value)||S._mSender||p.month_sender||'').trim())||'—';
    const stt=p.month_status==='approved'?'✅ MÊS APROVADO':p.month_status==='rejected'?'❌ REVISÃO SOLICITADA':'⏳ AINDA NÃO AVALIADO';
    let t=`🗓️ *APROVAÇÃO DO MÊS — ${c.name}*\n${p.title}${p.period?' ('+p.period+')':''}\nResponsável: ${name}\nStatus: ${stt}\nData: ${nowStr()}\n`;
    S.cItems.forEach((it)=>{
      if(it.row_type==='week'){ t+=`\n${'─'.repeat(34)}\n🗂️ *${it.title||it.week||'Semana'}*\n`; }
      else {
        t+=`\n*${it.title||'(tema)'}*\n${it.format||''}${it.post_date?' · '+fmtDate(it.post_date):''}\n`;
        if(it.description&&it.description.trim()) t+=`${it.description.trim()}\n`;
        if(it.note&&it.note.trim()) t+=`\n✏️ *Ajuste pedido:* ${it.note.trim()}\n`;
      }
    });
    t+=`\n${'─'.repeat(34)}\nEnviado via plug.aprova · ${CFG.agencyName}`;
    return t;
  }
  const name=(S.cSender||'').trim()||'—';
  let t=`📋 *APROVAÇÃO DE CONTEÚDO — ${c.name}*\n${p.title}${p.period?' ('+p.period+')':''}\nResponsável: ${name}\nData: ${nowStr()}\n`;
  S.cItems.forEach((it,i)=>{ t+=`\n${'─'.repeat(34)}\n*${i+1}. ${it.title||'Item '+(i+1)}*\n${(it.platforms||[]).join(' · ')||''}${it.format?' · '+it.format:''}\n`;
    if(it.has_copy){ const d=S.cDecisions[it.id+'-copy']; const ic=!d?'⏳ PENDENTE':d.status==='approved'?'✅ APROVADO':'❌ REPROVADO';
      t+=`\n✍️ *Copy* — ${ic}\n${it.copy||'(sem texto)'}\n`; if(it.hashtags)t+=`${it.hashtags}\n`;
      if(d&&d.status==='rejected'&&d.notes)t+=`✏️ *Ajuste pedido:* ${d.notes}\n`; }
    if(it.has_creative){ const d=S.cDecisions[it.id+'-creative']; const ic=!d?'⏳ PENDENTE':d.status==='approved'?'✅ APROVADO':'❌ REPROVADO';
      t+=`\n🎨 *Criativo* — ${ic}\n`; if(it.creative_url)t+=`${it.creative_url}\n`;
      if(d&&d.status==='rejected'&&d.notes)t+=`✏️ *Ajuste pedido:* ${d.notes}\n`; }
  });
  t+=`\n${'─'.repeat(34)}\nEnviado via plug.aprova · ${CFG.agencyName}`;
  return t;
}
async function agencyContact(){ const {data}=await sb.from('agency').select('whatsapp,email').eq('id',1).maybeSingle(); return data||{}; }
async function cliWhatsapp(){ const a=await agencyContact(); const wa=(a.whatsapp||'').replace(/\D/g,''); window.open('https://wa.me/'+wa+'?text='+encodeURIComponent(buildClientText()),'_blank'); }
async function cliEmail(){ const a=await agencyContact(); window.location.href='mailto:'+(a.email||'')+'?subject='+encodeURIComponent('Aprovação — '+S.cClient.name+' · '+(S.cProjects.find(x=>x.id===S.cActiveProj)||{}).title)+'&body='+encodeURIComponent(buildClientText()); }

boot();
</script>
